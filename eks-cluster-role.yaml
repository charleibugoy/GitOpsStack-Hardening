AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for EKS Cluster - eksClusterRole'

Resources:
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eksClusterRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Description: IAM role for Amazon EKS Cluster
      MaxSessionDuration: 3600

  # ==================== SSH Key Pair ====================
  NodeKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: node-key-pair
      KeyType: rsa
      KeyFormat: pem
      Tags:
        - Key: Name
          Value: node-key-pair

  # ==================== Output ====================

Outputs:
  EksClusterRoleArn:
    Description: ARN of the EKS Cluster IAM Role
    Value: !GetAtt EksClusterRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EksClusterRoleArn"
  
  KeyPairName:
    Description: SSH Key Pair Name for Worker Nodes
    Value: !Ref NodeKeyPair