apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-default-deny-networkpolicy
  annotations:
    policies.kyverno.io/title: Add Default Deny Network Policy
    policies.kyverno.io/category: Multi-Tenancy, Security
    policies.kyverno.io/description: >-
      To enforce a Zero Trust architecture, this policy automatically 
      generates a default-deny-all NetworkPolicy whenever a new Namespace 
      is created in the cluster.
spec:
  rules:
    - name: generate-default-deny
      match:
        any:
        - resources:
            kinds:
              - Namespace
      # Exclude system namespaces so we don't break cluster operations
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kyverno
              - istio-system
      generate:
        # Keep the generated policy in sync if the template below changes
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        # Dynamically targets the newly created namespace
        namespace: "{{request.object.metadata.name}}" 
        data:
          spec:
            # Empty podSelector means it applies to ALL pods in the namespace
            podSelector: {}
            policyTypes:
            - Ingress
            - Egress
            # Notice there are no 'ingress:' or 'egress:' allow rules. 
            # This creates a hard block on everything.