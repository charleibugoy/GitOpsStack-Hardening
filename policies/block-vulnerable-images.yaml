apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-high-critical-vulnerabilities
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: block-critical-vulns
    match:
      any:
      - resources:
          kinds: ["Pod"]
    preconditions:
      all:
      - key: "{{request.operation}}"
        operator: In
        value: ["CREATE", "UPDATE"]
    validate:
      # The main message is now a fallback string
      message: "Admission blocked due to DoD Vulnerability Policy thresholds."
      foreach:
      - list: "request.object.spec.containers"
        # 1. Context lookup stays the same
        context:
        - name: imageVulnerabilities
          apiCall:
            urlPath: /apis/aquasecurity.github.io/v1alpha1/namespaces/{{request.namespace}}/vulnerabilityreports
            jmesPath: "items[?status.artifact.repository=='{{element.image}}'].status.summary | [0]"
        
        # 2. MOVED MESSAGE HERE: This allows you to safely use {{element.image}}
        elementProcessedWithMessage: true
        message: "Image {{element.image}} is blocked. Critical vulns found: {{imageVulnerabilities.critical || '0'}}, High vulns found: {{imageVulnerabilities.high || '0'}} (Max allowed: 0 Critical, 5 High)."

        # 3. Deny criteria
        deny:
          conditions:
            any:
            - key: "{{ imageVulnerabilities.critical || `0` }}"
              operator: GreaterThan
              value: 0
            - key: "{{ imageVulnerabilities.high || `0` }}"
              operator: GreaterThan
              value: 5