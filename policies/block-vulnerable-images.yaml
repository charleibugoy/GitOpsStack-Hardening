apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-high-critical-vulnerabilities
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: block-critical-vulns
    match:
      any:
      - resources:
          kinds: ["Pod"]
    preconditions:
      all:
      - key: "{{request.operation}}"
        operator: In
        value: ["CREATE", "UPDATE"]
    validate:
      # This acts as the default fallback message required by the root validate block
      message: "Admission blocked due to DoD Vulnerability Policy thresholds."
      foreach:
      - list: "request.object.spec.containers"
        context:
        - name: imageVulnerabilities
          apiCall:
            urlPath: /apis/aquasecurity.github.io/v1alpha1/namespaces/{{request.namespace}}/vulnerabilityreports
            jmesPath: "items[?status.artifact.repository=='{{element.image}}'].status.summary | [0]"
        
        # The correct placement for custom messages in a foreach loop is inside the deny block
        deny:
          elementProcessedWithMessage: true
          message: "Image {{element.image}} is blocked. Critical vulns: {{imageVulnerabilities.critical || '0'}}, High vulns: {{imageVulnerabilities.high || '0'}} (Threshold: 0 Critical, 5 High)."
          conditions:
            any:
            - key: "{{ imageVulnerabilities.critical || `0` }}"
              operator: GreaterThan
              value: 0
            - key: "{{ imageVulnerabilities.high || `0` }}"
              operator: GreaterThan
              value: 5