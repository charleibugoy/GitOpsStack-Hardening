apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardened-app
  namespace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hardened-app
  template:
    metadata:
      labels:
        app: hardened-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        # Better public image with full Python
        image: public.ecr.aws/docker/library/python:3.11-slim-bookworm
        imagePullPolicy: IfNotPresent
        
        # Mount the app code (we'll use a ConfigMap or init for now)
        command: ["gunicorn"]
        args:
        - "--workers=2"
        - "--bind=0.0.0.0:8080"
        - "app:app"
        
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"