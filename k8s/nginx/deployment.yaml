apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hardened
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hardened
  template:
    metadata:
      labels:
        app: nginx-hardened
    spec:
      serviceAccountName: nginx-hardened-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: nginx
        image: nginx:1.31.0-alpine-slim         # Very small and stable
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80