apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hardened
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hardened
  template:
    metadata:
      labels:
        app: nginx-hardened
    spec:
      serviceAccountName: nginx-hardened-sa
      securityContext:
        runAsNonRoot: true
        # Setting the explicit UID tells K8s exactly who is running it
        runAsUser: 101 
        runAsGroup: 101
        fsGroup: 101

      containers:
      - name: nginx
        # Changed to the official unprivileged variant
        image: nginxinc/nginx-unprivileged:1.27-alpine-slim
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080 # Unprivileged images use 8080 by default