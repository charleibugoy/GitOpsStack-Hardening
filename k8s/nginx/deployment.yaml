apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hardened
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hardened
  template:
    metadata:
      labels:
        app: nginx-hardened
    spec:
      serviceAccountName: nginx-hardened-sa
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        #fsGroupChangePolicy: OnRootMismatch

      containers:
      - name: nginx
        image: nginx:1.31.0-alpine-slim
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

        #securityContext:
         # runAsNonRoot: true
          #runAsUser: 101
          #allowPrivilegeEscalation: false
          #readOnlyRootFilesystem: true          # ← Now safe
          #capabilities:
           # drop: ["ALL"]

        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: tmp
          mountPath: /tmp
        - name: run
          mountPath: /var/run

      volumes:
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: run
        emptyDir: {}