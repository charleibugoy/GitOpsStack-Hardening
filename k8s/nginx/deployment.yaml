apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hardened
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hardened
  template:
    metadata:
      labels:
        app: nginx-hardened
    spec:
      containers:
      - name: nginx
        image: nginx:latest         # Very small and stable
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80